<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shany & Benjamin – Mariage</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; width: 100%; height: 100vh; }

  #splash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    z-index: 9999;
    overflow: hidden;
  }

  /* Photo plein écran, cadrée vers le haut */
  #splash .splash-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }
  #splash .splash-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Dégradé bas pour lisibilité */
  #splash .splash-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.0) 50%,
      rgba(0,0,0,0.45) 100%
    );
  }

  /* ✅ Initiales réduites, sur le côté */
  #splash .splash-logo {
    position: absolute;
    top: 18px;
    right: 18px;
    font-family: 'Great Vibes', cursive;
    font-size: 1.6rem;
    color: #c8a96e;
    z-index: 3;
    text-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }

  /* ✅ Bouton plus petit */
  #splash .splash-btn-wrap {
    position: absolute;
    bottom: 22%;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
    padding: 0 20px;
  }
  #splash .splash-btn {
    background: rgba(255,255,255,0.88);
    border: none;
    border-radius: 50px;
    padding: 10px 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: #4a2010;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 3px 16px rgba(0,0,0,0.22);
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s, transform 0.15s;
  }
  #splash .splash-btn:active {
    transform: scale(0.97);
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-bg">
    <img src="couple.jpeg" alt="Shany & Benjamin">
  </div>

  <div class="splash-overlay"></div>

  <!-- ✅ Initiales plus petites, sur le côté -->
  <div class="splash-logo">S &amp; B</div>

  <!-- ✅ Bouton réduit → redirige vers invitation.html -->
  <div class="splash-btn-wrap">
    <button class="splash-btn" onclick="window.location.href='invitation.html'">
      Voir la carte
    </button>
  </div>
</div>

</body>
</html>
